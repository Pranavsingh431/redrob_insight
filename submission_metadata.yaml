ai_usage_summary: |
  Used Claude for architecture discussion, code review, and refactoring.
  Used Gemini via OpenRouter ONLY inside streamlit_demo.py for the recruiter
  co-pilot and mock-interviewer features (network is permitted for the demo;
  the ranker itself makes zero network calls). No candidate data was fed to any
  external LLM. Ranking is 100% local CPU computation.

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  Cascading 5-layer ranker optimised for the 0.50*NDCG@10 + 0.30*NDCG@50 +
  0.15*MAP + 0.05*P@10 metric. Layer 1 is a word-boundary-safe keyword/title
  screen (avoids 'rag' matching 'storage'). Layers 2B-2F compute six grounded
  sub-scores — skills (anti-keyword-stuffing, 0.65x penalty for unverified
  skills), career coherence (title used as a hard MULTIPLIER so non-technical
  titles cap at 12%, catching the Marketing-Manager-with-AI-keywords trap),
  behavioral availability (recency decay + open_to_work multiplier), location,
  and pre-labeled education tier. Only the top 4K by L2 composite are embedded
  (multi-aspect sentence-transformers MiniLM, 3 weighted JD queries, fully
  offline), keeping runtime under 4 min on CPU. Layer 3 honeypot detection
  catches temporal impossibility (incl. job duration vs calendar time),
  expert-without-evidence, and title-skills mismatch; 2+ flags force a 0.0
  multiplier so honeypots cannot enter the top 100. Reasoning strings are built
  entirely from real profile fields and append honest 'concerns' clauses where
  availability/notice/experience is weak.

